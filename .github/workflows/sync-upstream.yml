name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00（北京时间 10:00）
  workflow_dispatch:       # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/fathah/hermes-desktop.git
          git fetch upstream
          git checkout main
          # Rebase our commits on top of upstream so local patches are preserved.
          # If there are conflicts the job fails and you resolve manually.
          git rebase upstream/main
          git push --force-with-lease origin main
